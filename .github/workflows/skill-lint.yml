name: Skill Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-copy-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run copy lint
        run: python scripts/lint_copy_rules.py .
